schema: spec-driven

context: |
  Tech stack: Python 3.11+, python-telegram-bot 21.x, OpenAI GPT-4o Vision + text
  Architecture: Single-process async Telegram bot, polling mode, two GPT flows
  Market data: yfinance (real-time prices), httpx for HTTP
  Persistence: companies.json (flat JSON), in-memory state for rate limiting and pending actions
  Deployment: Render/Heroku via Procfile (worker: python bot.py)
  Config: .env for secrets, prompts.py for AI prompts

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules (bot.py, prompts.py, companies.json)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for async flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing async patterns (asyncio, run_in_executor for blocking calls)
    - Maintain JSON schema compatibility for GPT responses
    - Use existing logging pattern: user_id=X | type=Y | extra
  verify:
    - No automated test runner — manual verification via bot interaction
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: false
  test_runner: null
  layers:
    unit: false
    integration: false
    e2e: false
  coverage: false
  linter: false
  type_checker: false
  note: "No test infrastructure configured. CLAUDE.md explicitly states: There are no tests or linting configured."
